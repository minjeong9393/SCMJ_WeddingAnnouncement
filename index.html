<html lang="ko">

    <title>허신철♥김민정 결혼알림장</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
      rel="stylesheet" />

  </head>
  <body>
    <!-- ═══ Curtain Opening Animation ═══ -->
    <div id="curtain" class="curtain">
      <div class="curtain__left"></div>
      <div class="curtain__right"></div>
      <div class="curtain__content">
        <p class="curtain__subtitle">Wedding Invitation</p>
        <p class="curtain__names" id="curtainNames"></p>
        <button class="curtain__btn" id="curtainBtn">초대장 열기</button>
      </div>
    </div>

    <!-- ═══ Falling Petals ═══ -->
    <canvas id="petalCanvas" class="petal-canvas"></canvas>

    <!-- ═══ Toast Notification ═══ -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- ═══ Photo Viewer Modal ═══ -->
    <div id="photoModal" class="photo-modal" role="dialog" aria-modal="true" aria-label="사진 보기">
      <button class="photo-modal__close" id="modalClose" aria-label="닫기">&times;</button>
      <button class="photo-modal__nav photo-modal__nav--prev" id="modalPrev" aria-label="이전 사진">&#8249;</button>
      <button class="photo-modal__nav photo-modal__nav--next" id="modalNext" aria-label="다음 사진">&#8250;</button>
      <div class="photo-modal__container" id="modalContainer">
        <img class="photo-modal__img" id="modalImg" src="" alt="사진" draggable="false">
      </div>
      <div class="photo-modal__counter" id="modalCounter"></div>
    </div>

    
    <!-- ═══ Main Content ═══ -->
    <main id="mainContent" class="main-content">
      <!-- ─── Hero Section ─── -->
      <section class="section hero" id="hero">
        <div class="hero__overlay"></div>
        <img class="hero__photo" id="heroPhoto" src="" alt="웨딩 사진" loading="eager" />
        <div class="hero__content">
          <p class="hero__label animate-item" data-animate="fade-down">forever starts now</p>
          <h1 class="hero__names animate-item" data-animate="fade-up" id="heroNames"></h1>
          <div class="hero__divider animate-item" data-animate="fade-in"></div>

          <p class="hero__date animate-item" data-animate="fade-up" id="heroDate" style="display: none"></p>
          <p class="hero__venue animate-item" data-animate="fade-up" id="heroVenue"></p>
        </div>

        <!-- Countdown -->

        <div class="countdown animate-item" data-animate="fade-up" id="countdown" style="display: none">
          <p class="countdown__label" id="countdownLabel"></p>
          <div class="countdown__timer">
            <div class="countdown__item">
              <span class="countdown__number" id="countDays">0</span>
              <span class="countdown__unit">일</span>
            </div>
            <div class="countdown__sep">:</div>
            <div class="countdown__item">
              <span class="countdown__number" id="countHours">0</span>
              <span class="countdown__unit">시간</span>
            </div>
            <div class="countdown__sep">:</div>
            <div class="countdown__item">
              <span class="countdown__number" id="countMinutes">0</span>
              <span class="countdown__unit">분</span>
            </div>
            <div class="countdown__sep">:</div>
            <div class="countdown__item">
              <span class="countdown__number" id="countSeconds">0</span>
              <span class="countdown__unit">초</span>
            </div>
          </div>
        </div>
      </section>

      <!-- ─── Greeting Section ─── -->

        <div class="section__inner">
          <h2 class="section__title animate-item" data-animate="fade-up">갤러리</h2>
          <div class="gallery__grid" id="galleryGrid"></div>
        </div>
      </section>

      <!-- ─── Location Section ─── -->
      <section class="section location" id="location" style="display: none;">
        <div class="section__inner">
          <h2 class="section__title animate-item" data-animate="fade-up">오시는 길</h2>
          <div class="location__info animate-item" data-animate="fade-up">
            <p class="location__venue" id="locationVenue"></p>
            <p class="location__hall" id="locationHall"></p>
            <p class="location__address" id="locationAddress"></p>
            <p class="location__tel" id="locationTel"></p>
          </div>
          <button class="btn btn--text location__copy animate-item" data-animate="fade-up" id="copyAddressBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
            주소 복사
          </button>
          <div class="location__map animate-item" data-animate="scale-in">
            <img class="location__map-img" id="locationMapImg" src="" alt="약도" loading="lazy" />
          </div>
          <div class="location__links animate-item" data-animate="fade-up">
            <a class="btn btn--kakao" id="kakaoMapBtn" href="#" target="_blank" rel="noopener">카카오맵</a>
            <a class="btn btn--naver" id="naverMapBtn" href="#" target="_blank" rel="noopener">네이버지도</a>
          </div>
        </div>
      </section>

      <!-- ─── Account Section (축의금) ─── -->
      <section class="section account" id="account">
        <div class="section__inner">
          <h2 class="section__title animate-item" data-animate="fade-up">마음 전하실 곳</h2>
          <p class="account__desc animate-item" data-animate="fade-up">축하의 마음을 담아 전달해 보세요.</p>

          <!-- Groom Accounts -->
          <div class="accordion animate-item" data-animate="fade-up">
            <button class="accordion__trigger" id="groomAccordion" aria-expanded="false">
              <span class="accordion__icon">&hearts;</span>
              <span>신랑측 계좌번호</span>
              <svg
                class="accordion__arrow"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>
            <div class="accordion__panel" id="groomAccordionPanel">
              <div class="accordion__panel-inner" id="groomAccountList"></div>
            </div>
          </div>

          <!-- Bride Accounts -->
          <div class="accordion animate-item" data-animate="fade-up" style="margin-bottom: 0;">
            <button class="accordion__trigger" id="brideAccordion" aria-expanded="false">
              <span class="accordion__icon">&hearts;</span>
              <span>신부측 계좌번호</span>
              <svg
                class="accordion__arrow"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>
            <div class="accordion__panel" id="brideAccordionPanel">
              <div class="accordion__panel-inner" id="brideAccountList"></div>
            </div>
          </div>
        </div>
        
      </section>

      <!-- ─── Footer ─── -->
      <footer class="footer">
        <p class="footer__text" id="footerText" style="display: none;"></p>
        <p class="footer__text">허신철 &amp; 김민정 드림</p>
      </footer>
    </main>


    <script src="script.js"></script>
  </body>
</html>
